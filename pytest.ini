# pytest.ini - pytest configuration
[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode (fixes pytest-asyncio collection issue)
# asyncio_mode = auto
# asyncio_default_fixture_loop_scope = function

# Ignore patterns - excluding slow/problematic tests
addopts =
    -v
    --tb=short
    --strict-markers
    --ignore=tests/test_properties.py
    --ignore=tests/test_properties_simple.py

# Custom markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    hypothesis: marks property-based tests using hypothesis

# Hypothesis settings
# hypothesis_profile = ci

[hypothesis]
# Conservative settings for CI
max_examples = 10
deadline = 1000

# Warning filters
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PytestReturnNotNoneWarning
