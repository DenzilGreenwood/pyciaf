name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    
    - name: Run core tests
      run: |
        python tests/test_capsule_bugfix.py
        python tests/test_web_integration.py

    - name: Check imports
      run: |
        python -c "import ciaf; print(f'CIAF version: {ciaf.__version__}')"
        python -c "from ciaf import web, watermarks, compliance; print('All imports successful')"
    
    - name: Run type checking (mypy)  
      run: |
        mypy ciaf/
      continue-on-error: true
    
    - name: Run linting (ruff)
      run: |
        pip install ruff
        ruff check ciaf/
      continue-on-error: true